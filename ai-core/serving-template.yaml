apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: fraud-detection-claims-serving
  annotations:
    scenarios.ai.sap.com/name: fraud-detection-claims
    scenarios.ai.sap.com/description: Motor insurance fraud assessment API
    executables.ai.sap.com/name: fraud-assessment-api
    executables.ai.sap.com/description: Joule-friendly fraud assessment endpoint
  labels:
    scenarios.ai.sap.com/id: fraud-detection-claims
    ai.sap.com/version: "1.0.0"
spec:
  template:
    apiVersion: serving.kserve.io/v1beta1
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "2"
    spec: |
      predictor:
        imagePullSecrets:
          - name: 5b549799-1bcc-4f1c-9dbc-4c4ee31a20bc=
        containers:
          - name: fraud-detection-claims-api
            image: docker.io/itsmarlo/fraud-detection-claims-api:v1
            ports:
              - containerPort: 8080
                protocol: TCP
            env:
              - name: PORT
                value: "8080"
              - name: APP_ENV
                value: "ai-core"
              - name: ENABLE_LLM_ENCODER
                value: "true"
              - name: LLM_PROVIDER
                value: "btp"
              - name: AICORE_RESOURCE_GROUP
                value: "grounding-test"
              - name: AICORE_LLM_MODEL
                value: "claude-sonnet-4"
              - name: MASKING_REQUIRED
                value: "true"
              - name: STORAGE_BACKEND
                value: "local"
              - name: AICORE_BASE_URL
                valueFrom:
                  secretKeyRef:
                    name: fraud-aicore-secrets
                    key: AICORE_BASE_URL
              - name: AICORE_TOKEN_URL
                valueFrom:
                  secretKeyRef:
                    name: fraud-aicore-secrets
                    key: AICORE_TOKEN_URL
              - name: AICORE_CLIENT_ID
                valueFrom:
                  secretKeyRef:
                    name: fraud-aicore-secrets
                    key: AICORE_CLIENT_ID
              - name: AICORE_CLIENT_SECRET
                valueFrom:
                  secretKeyRef:
                    name: fraud-aicore-secrets
                    key: AICORE_CLIENT_SECRET
              - name: ORCH_DEPLOYMENT_URL
                valueFrom:
                  secretKeyRef:
                    name: fraud-aicore-secrets
                    key: ORCH_DEPLOYMENT_URL
            readinessProbe:
              httpGet:
                path: /health
                port: 8080
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
